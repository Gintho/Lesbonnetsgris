<main class="demo-page">
  <span class="demo-kicker">Composants · 03</span>
  <h1 class="demo-title">Cards</h1>
  <div class="demo-grid demo-grid--3">
    <div class="lbg-card">
      <h3>Card standard</h3>
      <p class="text-sm" style="color:var(--color-text-muted); margin-bottom:0;">Ombre légère, fond blanc — usage par défaut.</p>

    <div class="lbg-card lbg-card--elevated">
      <h3>Card élevée</h3>

    </div>
    <div class="lbg-card lbg-card--neutral">
      <h3>Card neutre</h3>
      <p class="text-sm" style="color:var(--color-text-muted); margin-bottom:0;">Fond Lin, sans ombre — respiration dans une grille dense.</p>
