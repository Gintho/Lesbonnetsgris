<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Barre de progression cagnotte</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../assets/css/tokens.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="_demo.css">
</head>
<body>
<main class="demo-page">
  <span class="demo-kicker">Composants · 06 — priorité Notion</span>
  <h1 class="demo-title">Barre de progression cagnotte</h1>
  <p class="demo-intro">Réutilisable sur chaque page de collecte personnelle (V2 — Mouvement).</p>

  <div class="demo-grid demo-grid--2">
    <div class="lbg-card">
      <div class="lbg-cagnotte-progress__meta">
        <span class="lbg-cagnotte-progress__raised">640 €</span>
        <span class="lbg-cagnotte-progress__target">objectif 1 000 €</span>
      </div>
      <div class="lbg-cagnotte-progress__track">
        <div class="lbg-cagnotte-progress__fill" style="width:64%"></div>
      </div>
      <div class="lbg-cagnotte-progress__footer">
        <span>23 contributeurs</span>
        <span>64%</span>
      </div>
    </div>

    <div class="lbg-card">
      <div class="lbg-cagnotte-progress__meta">
        <span class="lbg-cagnotte-progress__raised">1 200 €</span>
        <span class="lbg-cagnotte-progress__target">objectif 1 000 €</span>
      </div>
      <div class="lbg-cagnotte-progress__track">
        <div class="lbg-cagnotte-progress__fill lbg-cagnotte-progress__fill--complete" style="width:100%"></div>
      </div>
      <div class="lbg-cagnotte-progress__footer">
        <span>47 contributeurs</span>
        <span>Objectif dépassé 🎉</span>
      </div>
    </div>
  </div>
</main>
</body>
</html>
