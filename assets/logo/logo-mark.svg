<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="Les Bonnets Gris">
  <title>Les Bonnets Gris — symbole</title>
  <!-- Bonnet : dôme -->
  <path d="M52,138 C52,78 76,46 120,46 C164,46 188,78 188,138"
        fill="none" stroke="#211D1A" stroke-width="6" stroke-linecap="round"/>
  <!-- Bonnet : côtes tricotées du dôme -->
  <g fill="none" stroke="#211D1A" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <path d="M76,134 C76,92 92,60 120,52"/>
    <path d="M104,140 C104,94 110,62 120,50"/>
    <path d="M120,140 L120,46"/>
    <path d="M136,140 C136,94 130,62 120,50"/>
    <path d="M164,134 C164,92 148,60 120,52"/>
  </g>
  <!-- Coeur contour (blanc) -->
  <g transform="translate(38,150) scale(4.4)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          fill="#FBF7F0" stroke="#211D1A" stroke-width="1.3" stroke-linejoin="round"/>
  </g>
  <!-- Coeur plein (orange) -->
  <g transform="translate(88,162) scale(4.4)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          fill="#F2642D"/>
  </g>
  <!-- Bonnet : revers (cache le haut des coeurs) -->
  <rect x="40" y="120" width="160" height="40" rx="20" fill="#FBF7F0" stroke="#211D1A" stroke-width="6"/>
  <!-- Bonnet : côtes tricotées du revers -->
  <g stroke="#211D1A" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="56" y1="124" x2="56" y2="156"/>
    <line x1="72" y1="124" x2="72" y2="156"/>
    <line x1="88" y1="124" x2="88" y2="156"/>
    <line x1="104" y1="124" x2="104" y2="156"/>
    <line x1="120" y1="124" x2="120" y2="156"/>
    <line x1="136" y1="124" x2="136" y2="156"/>
    <line x1="152" y1="124" x2="152" y2="156"/>
    <line x1="168" y1="124" x2="168" y2="156"/>
    <line x1="184" y1="124" x2="184" y2="156"/>
  </g>
  <!-- Pompon -->
  <circle cx="120" cy="32" r="15" fill="#FBF7F0" stroke="#211D1A" stroke-width="6"/>
  <g stroke="#211D1A" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <line x1="120" y1="13" x2="120" y2="6"/>
    <line x1="134" y1="20" x2="140" y2="14"/>
    <line x1="106" y1="20" x2="100" y2="14"/>
    <line x1="134" y1="44" x2="140" y2="50"/>
    <line x1="106" y1="44" x2="100" y2="50"/>
  </g>
</svg>
